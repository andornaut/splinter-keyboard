meta:
  engine: 4.2.1 # min; matches package.json ergogen dep

# --- Units ---
units:
  c: 14.5 # MX cutout/hole length, sized to clear the CNC corner fillet
  s: 16 # MX widest is 15.6mm
  cnc_fillet: 1 # switch cutout/recess internal corner radius for the CNC end mill
  u: U # key pitch
  # Screw-boss radius: the CNC/printed case metal each M2.5 threads into (DXF
  # reference curve, never cut into the PCB).
  screw_boss_radius: 2.75
  # Thumbcluster splay angle (deg), single source of truth: the thumb keys splay
  # by this and the thumb diodes counter-rotate by -thumb_splay to sit horizontal.
  thumb_splay: -19.20
  # Thumb diode offset from its switch in the splayed key frame. Keep
  # dx = dy * tan(thumb_splay) so it stays centered when dy changes.
  thumb_diode_dy: -4.7
  thumb_diode_dx: 1.64
  # Thumbcluster edge pad-out, separate per axis: _h is the uniform expand on the
  # _thumbbinding hull, _v trims the bottom back (see _thumbbinding).
  thumb_pad_h: 0.5
  thumb_pad_v: -0.255
  # Extra padding on the thumb cluster's inner edge ONLY (splayed-horizontal, via a
  # polygon on the inner thumb key in _thumbbinding). Pushes the inner board edge off
  # the inner mod-key pad (2mm keepout) and out to the box inner edge (closes the
  # inner-corner notch), without growing the vertical pads (which thumb_pad_h would).
  thumb_inner_pad: 0.9
  # MCU/reset/TRRS/TVS/resistor placement (off matrix_five_num, both halves).
  # x is shared per column: MCU+reset on mcu_reset_x, the rest on trrs_tvs_resistor_x.
  mcu_reset_x: 17.965
  # Seats the Liatris PCB edge flush with the board top edge, leaving the USB-C
  # connector mouth (which the footprint draws protruding past the body outline)
  # to overhang the edge so a cable can plug in from outside the case wall. Biased
  # down ~0.4mm past footprint-flush because the real board runs that much longer
  # than the footprint body outline at the USB end.
  mcu_y: -1.40
  reset_y: 8.065 # set for an 8mm body-edge gap below the MCU
  trrs_tvs_resistor_x: mcu_reset_x + 12.860
  trrs_y: 15.525
  # Drop the TVS so its body-edge gap up to the TRRS equals the gap down to the
  # resistor: the TVS sits symmetrically between its two neighbours (mirrors the
  # bottom gap up). Carries the resistor (defined off tvs_y) down with it.
  tvs_y: trrs_y - 21.57
  # Sets the body-edge gap below the TVS, with room for the TVS's multi-line silk
  # label plus clearance to the resistor; tvs_y mirrors this same gap above the TVS.
  resistor_y: tvs_y - 10.145
  # Silkscreen credit text offsets. Center-justified (see footprint). Pushed down to
  # sit clear below the provenance stamp, both just inside the perimeter keepout; the
  # credit then overlaps the keyswitch outlines (User.Eco1 only, never on the PCB).
  label_credit_y: 9.4
  # Pushed out to abut the perimeter keepout at the outer (pinky) edge: as far out
  # as it goes while staying clear of the keepout. Left/right tuned separately
  # (pinky differs); no vertical room (the top edge is just above).
  label_credit_x_left: -u/2 -u +24.9 # left pinky
  label_credit_x_right: u/2 -24.9 # right pinky
  # Component label y-offsets. Each label reuses its component's x var (same
  # column); hugging labels track the part's y, label_mcu_y is absolute.
  label_mcu_y: -20.55
  label_trrs_y: trrs_y - 14.27
  # TRRS pad-net labels: centered on the jack centerline (the gap between its two
  # mirrored pad columns), each level with its net's pad row. Offsets are the
  # footprint's local pad ys, which run downward, so subtract from trrs_y.
  label_trrs_gnd_y: trrs_y - 3.2 # SL pad row
  label_trrs_data_y: trrs_y - 6.2 # R2 pad row
  label_trrs_vcc_y: trrs_y - 10.75 # TP pad row
  label_tvs_y: tvs_y - 4.34
  label_resistor_y: resistor_y - 5.42
  label_reset_y: reset_y - 6.52
  # Reset pad-net label offset: GND uses +dx (right of pad column), RST -dx.
  label_reset_pad_dx: 4.5
  # Diode/socket label offset, off matrix_two_lower; tucked into the bottom-pinky
  # margin to abut the perimeter keepout at the outer and bottom edges (placement
  # rationale at the footprint).
  label_diode_x: -57.795
  label_diode_y: -24.955
  # M2.5 label offset: every screw label sits above its hole, ~2mm from the drilled-hole
  # edge (radius ~1.5mm, the actual hole on the PCB; the boss circle is case-only on
  # Eco1.User and not fabricated). Above is the one direction clear of pads and diodes for
  # all six bosses (inner/outer/center on both halves); beside or below collides on at least one.
  label_screw_dy: 4.23

# --- Points: key matrix, thumbcluster, mounting holes ---
points:
  # --- Main key matrix ---
  zones.matrix:
    anchor:
      # The only absolute coordinate, and cosmetic: ergogen re-centers each PCB
      # afterward, so the value doesn't matter.
      shift: [69, -192]
    # Left half is the source of truth, mirrored to build the right. Keys marked
    # `mirror.skip: true` are left-only; their right counterparts live in
    # zones.extra and the thumbcluster.
    mirror: &matrix_mirror
      ref: matrix_five_num
      distance: 5u
    key.tags.left: true
    key.mirror.tags: &lr_mirror_tags
      left: $unset
      right: true
    columns:
      zero:
        key.column_net: P4
        key.mirror.skip: true
        rows:
          mod: # LCTRL
            bind: [0, u/4, 0, u/4]
            shift: [-u/4, 0]
            spread: 1.5u
            width: 1.5u
          lower: # LSHIFT
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
          home: # ESC
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
          upper: # TAB
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
          num: # `
            shift: [u/4, 0]
      one:
        key.column_net: P5
        key.mirror.skip: true
        rows:
          mod: # SUPER
          lower: # Z
          home: # A
          upper: # Q
          num: # 1
      # Columns two-five mirror to the right half. Comments show left key -> right
      # (mirrored) key. Columns three-five carry thumb keys, so their column nets
      # are YAML anchors aliased by the thumbcluster to share the matrix columns.
      two:
        key.stagger: 3
        key.column_net: P6
        key.mirror.column_net: P6
        rows:
          mod: # LALT
            mirror.skip: true
          lower: # X -> .
            bind: 1
          home: # S -> L
          upper: # W -> O
          num: # 2 -> 9
      three:
        key.stagger: 3
        key.column_net: &col_three_left P7
        key.mirror.column_net: &col_three_right P7
        rows:
          mod.skip: true # no mod-row key here
          lower: # C -> ,
            bind: 0
          home: # D -> K
          upper: # E -> I
          num: # 3 -> 8
      four:
        key.stagger: -3
        key.column_net: &col_four_left P8
        key.mirror.column_net: &col_four_right P8
        rows:
          mod.skip: true
          lower: # V -> M
            bind: 0
          home: # F -> J
          upper: # R -> U
          num: # 4 -> 7
      five:
        key.stagger: -3
        key.column_net: &col_five_left P15
        key.mirror.column_net: &col_five_right P19
        rows:
          mod.skip: true
          lower: # B -> N
            bind: 0
          home: # G -> H
          upper: # T -> Y
          num: # 5 -> 6
    # Per-row nets: row_net is the left mapping; mirror.row_net the right half's.
    # The matrix mod row is never mirrored, so it needs no mirror.row_net.
    rows:
      # &mod_row_left: aliased by the thumbcluster's left keys so they share the
      # matrix mod row. The right half's mod row is &mod_row_right (zones.extra).
      mod.row_net: &mod_row_left P9
      lower:
        row_net: P14
        mirror.row_net: P14
      home:
        row_net: P16
        mirror.row_net: P16
      upper:
        row_net: P10
        mirror.row_net: P10
      num:
        row_net: P18
        mirror.row_net: P15
  # --- Extra keys: the right half's inner columns ---
  # Right counterparts to the left's mirror.skip columns, defined explicitly
  # because they differ (backspace, punctuation, right mods).
  # P2 (GP2) is left free for the TRRS serial pin so one firmware
  # split.serial.pin = GP2 fits both halves (see data_resistor).
  zones.extra:
    key.tags.right: true
    anchor:
      ref: matrix_five_mod
      shift: [9u, 0]
    columns:
      zero:
        key.column_net: P5
        rows:
          mod: # BACKSPACE
            bind: [0, u/4, 0, u/4]
            shift: [u/4, 0]
            width: 1.5u
          lower: # /
            shift: [-u/4, 0]
          home: # ;
          upper: # P
          num: # 0
      dash:
        key.column_net: P4
        rows:
          mod.skip: true
          lower: # \
          home: # '
          upper: # [
          num: # -
      equal:
        key.column_net: P3
        rows:
          mod.skip: true
          lower: # SHIFT
          home: # ENTER
          upper: # ]
          num: # =
    # Right-half row->net mapping (differs from the main matrix's left mapping).
    rows:
      # &mod_row_right: aliased by the thumbcluster's mirrored (right) keys.
      mod.row_net: &mod_row_right P9
      lower.row_net: P14
      home.row_net: P16
      upper.row_net: P10 # matches the matrix's upper mirror row
      num.row_net: P15
  # --- Thumbcluster (mirrored to both halves) ---
  zones.thumbcluster:
    # The anchor shift and the splay are jointly solved against the thumb
    # constraint set (see AGENTS.md): anchor x sets the backspace-to-M column
    # offset, anchor y the backspace-to-M vertical gap (which also seats the hull
    # corner on the box bottom edge), and the splay the un-filleted board height.
    # thumb_inner_pad then pads the hull's inner edge out to meet the box inner edge.
    anchor:
      ref: matrix_four_lower
      shift: [-2.7280, -1u -2.4295]
    key.tags.left: true
    key.row_net: *mod_row_left # left thumb keys on the left mod row
    key.mirror.tags: *lr_mirror_tags
    key.mirror.row_net: *mod_row_right # right thumb keys on the right mod row
    mirror:
      ref: mirror_matrix_five_lower
      distance: -5u
    columns:
      three.rows.mod: # BACKSPACE
        splay: thumb_splay
        column_net: *col_three_left
        mirror:
          column_net: *col_three_right
      four.rows.mod: # SPACE
        bind: [0, u/4, 0, u/4]
        spread: 1.25u
        width: 1.5u
        column_net: *col_four_left
        mirror:
          column_net: *col_four_right
      five.rows.mod: # MOD
        shift: [u/4, 0]
        column_net: *col_five_left
        mirror:
          column_net: *col_five_right
  # --- Screw zones: mounting-hole anchors (outer, inner, center). Left is the
  # source, mirrored to the right (mirror_screw_*). The screw_left/screw_right tags
  # drive the per-PCB mounting_hole_npth footprints and the per-half hole/boss
  # outlines. Placement obeys two hard rules (see AGENTS.md): the boss never
  # overlaps a switch hole and stays clear of every copper pad. Each sits in a
  # diagonal gap between four switches; the asymmetric pinky columns make the
  # mirrored pair land differently per half, so outer/inner cannot share a y. The
  # center screw also serves as a centering peg. ---
  zones.screw_left_outer:
    mirror: *matrix_mirror
    key.tags.screw_left: true
    key.mirror.tags: &screw_mirror_tags
      screw_left: $unset
      screw_right: true
    anchor:
      ref: matrix_one_home
      # Diagonal gap, vertically centered between the home/lower switches beside
      # it, so the boss clears the switch holes on both halves (the right pinky
      # columns are too tight for it at the row level).
      shift: [-10, -9.525]
  zones.screw_left_inner:
    mirror: *matrix_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      ref: matrix_five_home
      # x makes the boss tangent to the switch hole beside it; y raised just
      # enough to clear the nearby hotswap-socket pad.
      shift: [-10, -5.825]
  # Center screw: a third mounting hole mid-board that doubles as a centering peg
  # and anti-flex clamp. Like the others it sits in a diagonal gap between four
  # switches, clearing the holes and pads.
  zones.screw_left_center:
    mirror: *matrix_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      ref: matrix_three_num
      shift: [-9.05, -27.8]

# --- Outlines: board shape and cutouts ---
outlines:
  _boxleft:
    - what: polygon
      points:
        # Outer (pinky) edge: the left's 1.5u pinky, tuned separately from the
        # right (the halves' pinky columns differ, so the gaps are not mirrored).
        - ref: matrix_zero_num
          shift: [-u/2 -u, u/2 +6.0]

        # Top edge straight across; the USB-C notch is subtracted separately
        # (_usbleft) after the fillet so its corners stay square.
        - ref: matrix_five_num
          shift: [u + 17.125, u/2 +6.0]
        # Inner edge (MCU/TRRS column, no keycap): offset out for TRRS/MCU clearance.
        # The thumb hull's inner edge is padded out to meet it (thumb_inner_pad), so
        # the thumb-inner junction is flush with no step. Retune with the TRRS position.
        - ref: matrix_five_lower
          shift: [u + 17.125, -1u -1/2u]
        - ref: matrix_zero_mod
          shift: [-u/4 -u +0.25, -u/2]
  _boxright:
    - what: polygon
      points:
        - ref: mirror_matrix_five_num
          shift: [u + 17.125, u/2 +6.0]

        # Outer (pinky) edge: 0.5mm keycap gap. The right pinky is 1u and the extra
        # inner column makes this half set the board width; the left pinky is 1.5u
        # and tuned separately, so the two outer edges are not mirrored.
        - ref: extra_equal_num
          shift: [u/2, u/2 +6.0]
        - ref: extra_equal_lower
          shift: [u/2, -u/2 -u]
        - ref: mirror_matrix_five_lower
          shift: [u + 17.125, -u -1/2u]
  # USB-C cutouts, subtracted from the walls after the fillet so the notch keeps
  # square corners. Centered on the Liatris socket and tied to mcu_reset_x so the
  # notch tracks the MCU; the top edge overshoots so the subtraction cuts through.
  _usbleft:
    - what: polygon
      points:
        - ref: matrix_five_num
          shift: [mcu_reset_x - 5 - 0.127, u/2 +8]
        - ref: matrix_five_num
          shift: [mcu_reset_x - 5 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [mcu_reset_x + 5 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [mcu_reset_x + 5 - 0.127, u/2 +8]
  _usbright:
    - what: polygon
      points:
        - ref: mirror_matrix_five_num
          shift: [mcu_reset_x + 5 - 0.127, u/2 +8]
        - ref: mirror_matrix_five_num
          shift: [mcu_reset_x + 5 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [mcu_reset_x - 5 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [mcu_reset_x - 5 - 0.127, u/2 +8]
  _boundsleft:
    - what: rectangle
      where: left
      size: u
      bound: true
  _boundsright:
    - what: rectangle
      where: right
      size: u
      bound: true
  # Screw holes: the M2.5 clearance hole, matching the mounting_hole_npth footprint
  # that cuts the PCB. These outlines only draw it into the case-export DXF as a
  # reference curve. Per-half scoped and stacked, like the bosses below.
  _screwsleft:
    - what: circle
      where: screw_left
      radius: 1.5
  _screwsright:
    - what: circle
      where: screw_right
      radius: 1.5
  # Screw bosses: the CNC/printed case metal the M2.5 threads into. Case-only reference
  # curve in the export DXF, never cut into the PCB. Per-half scoped: a stacked
  # circle outside its own board would add a floating disc.
  _screwbossesleft:
    - what: circle
      where: screw_left
      radius: screw_boss_radius
  _screwbossesright:
    - what: circle
      where: screw_right
      radius: screw_boss_radius
  # fillet rounds the cutout corners inward for a CNC end mill (internal corners
  # can't be cut sharp). The hole c is enlarged to clear that round (see units).
  _switchholesleft:
    - what: rectangle
      where: left
      fillet: cnc_fillet
      size: c
  _switchholesright:
    - what: rectangle
      where: right
      fillet: cnc_fillet
      size: c
  # Binding scoped to the thumb cluster only: the matrix is enclosed by the box,
  # but the thumb cluster sits below it and still needs its hull.
  _thumbbindingleft:
    - what: rectangle
      where: /^thumbcluster/
      size: u
      bound: true
      expand: thumb_pad_h
    # Splayed inner-edge padding: a key-height polygon on the inner thumb key's inner
    # side, rotating with the splay. Extends the inner board edge by thumb_inner_pad
    # without adding vertical padding (see thumb_inner_pad).
    - what: polygon
      points:
        - ref: thumbcluster_five_mod
          shift: [u/2, u/2]
        - ref: thumbcluster_five_mod
          shift: [u/2 +thumb_inner_pad, u/2]
        - ref: thumbcluster_five_mod
          shift: [u/2 +thumb_inner_pad, -u/2]
        - ref: thumbcluster_five_mod
          shift: [u/2, -u/2]
    # Trim the thumb hull's bottom edge via thumb_pad_v: subtract a wide rectangle
    # anchored to the middle thumb key (so it rotates with the splayed row); a more
    # negative thumb_pad_v cuts more, shrinking the thumb-bottom keycap gap. The
    # expand sets the outer keycap gap (thumb_pad_h); the inner edge is thumb_inner_pad.
    - what: rectangle
      where: /^thumbcluster_four/
      size: [70, 40]
      adjust:
        shift: [0, -29.525 -thumb_pad_v]
      operation: subtract
  _thumbbindingright:
    - what: rectangle
      where: /^mirror_thumbcluster/
      size: u
      bound: true
      expand: thumb_pad_h
    - what: polygon
      points:
        - ref: mirror_thumbcluster_five_mod
          shift: [u/2, u/2]
        - ref: mirror_thumbcluster_five_mod
          shift: [u/2 +thumb_inner_pad, u/2]
        - ref: mirror_thumbcluster_five_mod
          shift: [u/2 +thumb_inner_pad, -u/2]
        - ref: mirror_thumbcluster_five_mod
          shift: [u/2, -u/2]
    - what: rectangle
      where: /^mirror_thumbcluster_four/
      size: [70, 40]
      adjust:
        shift: [0, -29.525 -thumb_pad_v]
      operation: subtract
  _switchoutlinesleft:
    - what: rectangle
      where: left
      fillet: cnc_fillet
      size: s
  _switchoutlinesright:
    - what: rectangle
      where: right
      fillet: cnc_fillet
      size: s
  # fillet on the thumb-binding part rounds the exterior outline (box + thumb
  # binding) to fit a CNC-routed pocket. The USB-C notch is subtracted AFTER the
  # fillet so it keeps square corners.
  _wallsleft:
    - name: _boxleft
    - name: _thumbbindingleft
      fillet: 1.5
    - name: _usbleft
      operation: subtract
  _wallsright:
    - name: _boxright
    - name: _thumbbindingright
      fillet: 1.5
    - name: _usbright
      operation: subtract
  # These outlines feed the DXF case export only (the PCB edge cut uses _walls*
  # directly). Everything is stacked as reference curves for the 3D case model.
  # Must be stacked, not subtracted: a coincident/inner subtracted shape cancels
  # in the boolean simplify and vanishes from the export.
  left:
    - name: _wallsleft
    - name: _switchoutlinesleft
      operation: stack
    - name: _switchholesleft
      operation: stack
    - name: _screwbossesleft
      operation: stack
    - name: _screwsleft
      operation: stack
  right:
    - name: _wallsright
    - name: _switchoutlinesright
      operation: stack
    - name: _switchholesright
      operation: stack
    - name: _screwbossesright
      operation: stack
    - name: _screwsright
      operation: stack
  full:
    - name: left
    - name: right
  bounds:
    - name: full
    - name: _boundsleft
      operation: stack
    - name: _boundsright
      operation: stack

pcbs:
  left:
    template: kicad8 # ceoloide footprints need KiCad 8
    outlines:
      main.outline: _wallsleft
      keycaps:
        outline: _switchoutlinesleft
        layer: Eco1.User
      # Screw bosses drawn on a user layer (not copper, not edge cut) so they're
      # visible in the PCB editor as a routing keep-clear reference.
      screwbosses:
        outline: _screwbossesleft
        layer: Eco1.User
    footprints:
      # Matrix diodes inherit each key's rotation (axis-aligned on the matrix).
      diode: &diode
        what: diode_sod123
        where: /^matrix_/
        adjust:
          shift: [0, -5]
        params:
          side: B
          include_tht: false
          reversible: false # B-only pads; matrix routes on F.Cu via the include_traces_vias via
          include_traces_vias: true # via per pad exposes the net on F.Cu for the matrix
          from: "{{colrow}}"
          to: "{{row_net}}"
      # Thumb diodes: counter-rotate by -thumb_splay to cancel the thumbcluster
      # splay so they sit horizontal (matrix-aligned) instead of following it.
      diode_thumb:
        <<: *diode
        where: /^thumbcluster_/
        adjust:
          shift: [thumb_diode_dx, thumb_diode_dy]
          rotate: -1 * thumb_splay
      mounting_hole_npth: &mounting_hole_npth
        what: ceoloide/mounting_hole_npth
        where: screw_left
        params:
          hole_drill: 3.0 # M2.5 is 2.9mm
          hole_size: 3.0
      mx: &mx
        what: ceoloide/switch_mx
        where: left
        params:
          side: B
          hotswap: true
          solder: false
          from: "{{column_net}}" # Pin 1
          to: "{{colrow}}" # Pin 2
      mcu: &mcu
        what: mcu_liatris
        where:
          ref: matrix_five_num
          shift: [mcu_reset_x, mcu_y]
        params: &mcu_params
          side: F
          reversible: false
          reverse_mount: true
          include_extra_pins: false # GP12-GP16 unused
          show_silk_labels_on_both_sides: true # mirror pin labels to the exposed side
      reset: &reset
        what: button
        where:
          ref: matrix_five_home
          rotate: 270
          shift: [mcu_reset_x, reset_y]
        params:
          from: GND
          to: RST
          side: B
      # Hot-unplug mitigation: GND on the sleeve (last to break), data on ring R2,
      # VCC on the tip (per ceoloide/trrs_pj320a.js). DATA_RAW is the unprotected
      # jack-side net; after the TVS+resistor it reaches the MCU serial pin.
      trrs: &trrs
        what: ceoloide/trrs_pj320a
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, trrs_y]
        params:
          TP: VCC # 1  Tip
          R2: DATA_RAW # 3 Ring 2 (data; to GND via TVS, to MCU via resistor)
          SL: GND # 4  Sleeve
          reversible: true
          side: B
          # Symmetric uses only TP/R2/SL, which is exactly this 3-net pinout
          symmetric: true
      # Clamps data-line transients (e.g. hot-unplug) before the MCU.
      # from=anode, to=cathode; bidirectional, so A/K orientation is irrelevant.
      data_tvs: &data_tvs
        what: sod-123fl
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, tvs_y]
        params:
          side: B # single-side SMD, same side as the diodes (Economic PCBA)
          from: DATA_RAW
          to: GND
      # In series from DATA_RAW to the MCU serial pin, limiting residual surge
      # current after the TVS. Non-polar, so from/to is arbitrary. Both halves
      # output to P2 (GP2) so one firmware split.serial.pin = GP2 fits both.
      data_resistor: &data_resistor
        what: r_0805
        where:
          ref: matrix_five_num
          rotate: 90 # lays the vertical-default footprint horizontal
          shift: [trrs_tvs_resistor_x, resistor_y]
        params: &data_resistor_params
          designator: R # ref prefix R<n>
          side: B
          from: DATA_RAW
          to: P2 # serial data -> GP2
      # reversible -> copy on F+B silk. Center-justified so the back copy mirrors
      # onto the same spot, over the pinky top corner.
      label_credit: &label_credit
        what: ceoloide/utility_text
        where:
          ref: matrix_zero_num
          shift: [label_credit_x_left, label_credit_y]
        params:
          reversible: true
          layer: SilkS
          height: 1.2
          width: 1.2
          thickness: 0.18
          text: '\"Splinter\" keyboard v4 by @andornaut\nhttps://github.com/andornaut/splinter-keyboard'
      # Each label sits by its component on the same ref; the right half re-anchors
      # to mirror_ refs (x auto-flips). All side B + mirrored, to read from the back.
      label_mcu: &label_mcu
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [mcu_reset_x, label_mcu_y]
        params: &label_tht_params
          # Through-hole parts (MCU, TRRS jack, MX switch) get silk on BOTH sides
          # (reversible) so the part and its pads read from the front and the back.
          # SMD-only parts (TVS, resistor, reset) stay back-only via &label_params.
          # &text_style: shared silk text geometry (also used by the screw labels).
          <<: &text_style
            layer: SilkS
            height: 0.8
            width: 0.8
            thickness: 0.15
          reversible: true
          text: 'MCU\nsplitkb Liatris\nPro Micro (RP2040)'
      label_trrs: &label_trrs
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_y]
        params:
          <<: *label_tht_params
          text: 'TRRS\nPJ-320A'
      label_tvs: &label_tvs
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_tvs_y]
        params: &label_params
          # Back-only silk (side B, mirrored) for SMD parts, which live on the back.
          <<: *text_style
          reversible: false
          side: B
          mirrored: true
          text: 'TVS\nLittelfuse\nSMF5.0CA\nSOD-123FL'
      label_resistor: &label_resistor
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_resistor_y]
        params:
          <<: *label_params
          text: 'Resistor\n100R 1%\nUNI-ROYAL\n0805W8F-\n1000T5E\n0805'
      label_reset: &label_reset
        what: ceoloide/utility_text
        where:
          ref: matrix_five_home
          shift: [mcu_reset_x, label_reset_y]
        params:
          <<: *label_params
          text: 'Reset switch\nALPS SKQGABE010\n5.2mm'
      # Reset pad-net labels: +dx puts GND right of the pad column, -dx puts RST left.
      label_reset_gnd: &label_reset_gnd
        what: ceoloide/utility_text
        where:
          ref: matrix_five_home
          shift: [mcu_reset_x + label_reset_pad_dx, reset_y]
        params:
          <<: *label_params
          text: GND
      label_reset_rst: &label_reset_rst
        what: ceoloide/utility_text
        where:
          ref: matrix_five_home
          shift: [mcu_reset_x - label_reset_pad_dx, reset_y]
        params:
          <<: *label_params
          text: RST
      # TRRS pad-net labels: GND/DATA/VCC down the jack centerline, each level
      # with its pad row. The jack is symmetric, so each net has a pad either side
      # of the centerline; the label sits in the gap between the pair.
      label_trrs_gnd: &label_trrs_gnd
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_gnd_y]
        params:
          <<: *label_tht_params
          text: GND
      label_trrs_data:
        <<: *label_trrs_gnd
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_data_y]
        params:
          <<: *label_tht_params
          # MCU GPIO the data ring reaches (through the TVS+resistor): the data_resistor
          # `to: P2` net, which mcu_liatris.js maps to pad GP2, and which the firmware
          # uses as split.serial.pin. Update all three together if the serial pin changes.
          text: &trrs_data_pin GP2
      label_trrs_vcc:
        <<: *label_trrs_gnd
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_vcc_y]
        params:
          <<: *label_tht_params
          text: VCC
      # Diode + hotswap-socket part reference. Anchored to matrix_two_lower (the
      # pinky-closest key mirrored on both halves) so one shift serves both; the
      # right re-anchors to mirror_matrix_two_lower and x auto-flips. Bottom-pinky
      # margin. Never anchor to a screw zone: screw positions get retuned and would
      # drag the label off-board.
      label_diode: &label_diode
        what: ceoloide/utility_text
        where:
          ref: matrix_two_lower
          shift: [label_diode_x, label_diode_y]
        params:
          <<: *label_tht_params
          text: 'Socket\nKailh CPG151101S11\nMX hotswap\n\nDiode\n1N4148W\nSOD-123'
      # Screw labels (M2.5x0.45), one per hole, all on the left side for a consistent
      # look. Switch cutouts are case/plate geometry (User.Eco1/DXF), never cut into
      # the PCB, so they do not constrain silk; only the board edge and real copper
      # pads do (and all three clear both on the left).
      label_screw_left_outer: &label_screw_left_outer
        what: ceoloide/utility_text
        where:
          ref: screw_left_outer
          shift: [0, label_screw_dy]
        params:
          <<: *text_style
          reversible: true
          text: M2.5x0.45
      label_screw_left_inner:
        <<: *label_screw_left_outer
        where:
          ref: screw_left_inner
          shift: [0, label_screw_dy]
      label_screw_left_center:
        <<: *label_screw_left_outer
        where:
          ref: screw_left_center
          shift: [0, label_screw_dy]
  right:
    template: kicad8 # ceoloide footprints need KiCad 8
    outlines:
      main.outline: _wallsright
      keycaps:
        outline: _switchoutlinesright
        layer: Eco1.User
      # See left: screw bosses on a user layer as a routing keep-clear reference.
      screwbosses:
        outline: _screwbossesright
        layer: Eco1.User
    footprints:
      # See left for footprint details
      diode:
        <<: *diode
        where: /^(mirror_matrix|extra)_/
      # Thumb diodes: same input as the left; ergogen's mirror negates it to
      # cancel the mirrored +splay here.
      diode_thumb:
        <<: *diode
        where: /^mirror_thumbcluster_/
        adjust:
          shift: [thumb_diode_dx, thumb_diode_dy]
          rotate: -1 * thumb_splay
      mounting_hole_npth:
        <<: *mounting_hole_npth
        where: screw_right
      mx:
        <<: *mx
        where: right
      mcu:
        <<: *mcu
        where:
          ref: mirror_matrix_five_num
          shift: [mcu_reset_x, mcu_y]
        # Side B (not the left's F): mcu_liatris can't mirror in-plane, so the
        # side flip reflects its pads while keeping the USB at the top.
        params:
          <<: *mcu_params
          side: B
      reset:
        <<: *reset
        where:
          ref: mirror_matrix_five_home
          rotate: 270
          shift: [mcu_reset_x, reset_y]
      trrs:
        <<: *trrs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, trrs_y]
      data_tvs:
        <<: *data_tvs
        where:
          ref: mirror_matrix_five_num
          rotate: 180 # mirror A/K (bidirectional, irrelevant)
          shift: [trrs_tvs_resistor_x, tvs_y]
      data_resistor:
        <<: *data_resistor
        where:
          ref: mirror_matrix_five_num
          # 90 (same as the left, not 270): the mirror_ ref auto-negates it, so
          # this is the left's mirror image with the output pad facing the MCU.
          rotate: 90
          shift: [trrs_tvs_resistor_x, resistor_y]
        params:
          <<: *data_resistor_params
          # to: P2 inherited so both halves use the same serial pin.
      # Right half credit: over the outer (pinky) top corner, mirroring the left.
      label_credit:
        <<: *label_credit
        where:
          ref: extra_equal_num
          shift: [label_credit_x_right, label_credit_y]
      # Right half component labels: mirror_ refs auto-flip the x-shift.
      label_mcu:
        <<: *label_mcu
        where:
          ref: mirror_matrix_five_num
          shift: [mcu_reset_x, label_mcu_y]
      label_trrs:
        <<: *label_trrs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_y]
      label_tvs:
        <<: *label_tvs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_tvs_y]
      label_resistor:
        <<: *label_resistor
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_resistor_y]
      label_reset:
        <<: *label_reset
        where:
          ref: mirror_matrix_five_home
          shift: [mcu_reset_x, label_reset_y]
      label_reset_gnd:
        <<: *label_reset_gnd
        where:
          ref: mirror_matrix_five_home
          shift: [mcu_reset_x + label_reset_pad_dx, reset_y]
      label_reset_rst:
        <<: *label_reset_rst
        where:
          ref: mirror_matrix_five_home
          shift: [mcu_reset_x - label_reset_pad_dx, reset_y]
      label_trrs_gnd:
        <<: *label_trrs_gnd
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_gnd_y]
      label_trrs_data:
        <<: *label_trrs_gnd
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_data_y]
        params:
          <<: *label_tht_params
          text: *trrs_data_pin # mirrors the left half's GP2 (see left label_trrs_data)
      label_trrs_vcc:
        <<: *label_trrs_gnd
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_vcc_y]
        params:
          <<: *label_tht_params
          text: VCC
      label_diode:
        <<: *label_diode
        where:
          ref: mirror_matrix_two_lower
          shift: [label_diode_x, label_diode_y]
      label_screw_left_outer:
        <<: *label_screw_left_outer
        where:
          ref: mirror_screw_left_outer
          shift: [0, label_screw_dy]
      label_screw_left_inner:
        <<: *label_screw_left_outer
        where:
          ref: mirror_screw_left_inner
          shift: [0, label_screw_dy]
      label_screw_left_center:
        <<: *label_screw_left_outer
        where:
          ref: mirror_screw_left_center
          shift: [0, label_screw_dy]
