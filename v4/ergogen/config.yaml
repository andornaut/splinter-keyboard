meta:
  engine: 4.1.0 # Min Ergogen version for KiCad 8 footprints

# --- Units: Common measurements used throughout the config ---
units:
  c: 14 # Cherry MX switch cutout/hole length in mm
  s: 16 # Cherry MX switches are 15.6mm at their widest
  u: U # Key pitch. Set to ergogen's built-in U (19.05mm); ergogen's own default u is 19mm
  # --- MCU/TRRS placement (shifts off matrix_five_num, shared by both halves) ---
  mcu_x: 18 # MCU/reset column x-offset from matrix_five_num
  trrs_x: mcu_x + 13 # TRRS jack x; TVS and resistor stack at the same x
  trrs_y: 15 # TRRS jack y; TVS sits 16 below, resistor 22 below

# --- Points: Key matrix, thumb cluster, and mounting hole locations ---
points:
  # --- Main key matrix: standard alphanumeric and modifier keys ---
  zones.matrix:
    anchor:
      # --- Absolute origin (cosmetic) ---
      # The only absolute-coordinate value in the config; every other point is
      # relative to the matrix, so this just slides the whole design around the
      # sheet. Its exact value does not matter: scripts/recenter.py (run by
      # `npm run build`) re-centers each PCB on its own sheet afterward. It used
      # to carry fractional offsets to land the bbox center on (120, 160), but
      # recenter.py makes that unnecessary, so it's kept to whole numbers.
      shift: [69, -192]
    # The left half is the source of truth; each key is mirrored across the
    # gap to build the right half. Keys marked `mirror.skip: true` below are
    # left-only: their right-half counterparts are defined separately in
    # zones.extra (the right-hand inner columns) and the thumbcluster, so they
    # must not be auto-mirrored or they would be generated twice.
    mirror:
      ref: matrix_five_num
      distance: 5u
    key.tags.left: true
    key.mirror.tags:
      left: $unset
      right: true
    columns:
      zero:
        key.column_net: P2
        rows:
          mod: # LCTRL
            bind: [0, u/4, 0, u/4]
            shift: [-u/4, 0]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          lower: # LSHIFT
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          home: # ESC
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          upper: # TAB
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          num: # `
            shift: [u/4, 0]
            mirror.skip: true
      one:
        key.column_net: P3
        rows:
          mod: # SUPER
            mirror.skip: true
          lower: # Z
            mirror.skip: true
          home: # A
            mirror.skip: true
          upper: # Q
            mirror.skip: true
          num: # 1
            mirror.skip: true
      two:
        key.stagger: 3
        key.column_net: P9
        rows:
          mod: # LALT
            mirror.skip: true
          lower: # X
            bind: 1
            mirror: # .
              column_net: P5
              row_net: P14
          home: # S
            mirror: # L
              column_net: P5
              row_net: P16
          upper: # W
            mirror: # O
              column_net: P5
              row_net: P10
          num: # 2
            mirror: # 9
              column_net: P5
              row_net: P15
      three:
        key.stagger: 3
        key.column_net: P8
        rows:
          mod.skip: true # No bottom-most (mod-row) key in this column
          lower: # C
            bind: 0
            mirror: # ,
              column_net: P4
              row_net: P14
          home: # D
            mirror: # K
              column_net: P4
              row_net: P16
          upper: # E
            mirror: # I
              column_net: P4
              row_net: P10
          num: # 3
            mirror: # 8
              column_net: P4
              row_net: P15
      four:
        key.stagger: -3
        key.column_net: P7
        rows:
          mod.skip: true
          lower: # V
            bind: 0
            mirror: # M
              column_net: P3
              row_net: P14
          home: # F
            mirror: # J
              column_net: P3
              row_net: P16
          upper: # R
            mirror: # U
              column_net: P3
              row_net: P10
          num: # 4
            mirror: # 7
              column_net: P3
              row_net: P15
      five:
        key.stagger: -3
        key.column_net: P6
        rows:
          mod.skip: true
          lower: # B
            bind: 0
            mirror: # N
              column_net: P20
              row_net: P14
          home: # G
            mirror: # H
              column_net: P20
              row_net: P16
          upper: # T
            mirror: # Y
              column_net: P20
              row_net: P10
          num: # 5
            mirror: # 6
              column_net: P20
              row_net: P15
    # row_net is constant per row across the matrix (left/base mapping); the
    # mirrored right-half keys override it in their per-key `mirror:` blocks.
    rows:
      mod.row_net: P10
      lower.row_net: P16
      home.row_net: P14
      upper.row_net: P15
      num.row_net: P5
  # --- Extra keys: the right half's inner columns ---
  # These are the right-hand counterparts to the left columns that carry
  # `mirror.skip: true` above. They are defined explicitly (rather than
  # mirrored) because the right inner cluster differs from the left: backspace,
  # punctuation, and the right modifiers. Anchored 9u right of the left half.
  zones.extra:
    key.tags.right: true
    anchor:
      ref: matrix_five_mod
      shift: [9u, 0]
    columns:
      zero:
        key.column_net: P6
        rows:
          mod: # BACKSPACE
            bind: [0, u/4, 0, u/4]
            shift: [u/4, 0]
            width: 1.5u
          lower: # /
            shift: [-u/4, 0]
          home: # ;
          upper: # P
          num: # 0
      dash:
        key.column_net: P7
        rows:
          mod.skip: true
          lower: # \
          home: # '
          upper: # [
          num: # -
      equal:
        key.column_net: P8
        rows:
          mod.skip: true
          lower: # SHIFT
          home: # ENTER
          upper: # ]
          num: # =
    # Right-half row->net mapping (differs from the main matrix's left mapping).
    rows:
      mod.row_net: P9
      lower.row_net: P14
      home.row_net: P16
      upper.row_net: P10
      num.row_net: P15
  # --- Thumbcluster: keys for thumbs, mirrored for both hands ---
  zones.thumbcluster:
    anchor:
      ref: matrix_four_lower
      shift: [-3.45, -1u -3]
    key.tags.left: true
    key.row_net: P10 # every thumb key is on the mod row (left/base mapping)
    key.mirror.tags:
      left: $unset
      right: true
    key.mirror.row_net: P9 # right-half mod row
    mirror:
      ref: mirror_matrix_five_lower
      distance: -5u
    columns:
      three.rows.mod: # BACKSPACE
        splay: -18.925
        column_net: P8
        mirror:
          column_net: P4
      four.rows.mod: # SPACE
        bind: [0, u/4, 0, u/4]
        spread: 1.25u
        width: 1.5u
        column_net: P7
        mirror:
          column_net: P3
      five.rows.mod: # MOD
        shift: [u/4, 0]
        column_net: P6
        mirror:
          column_net: P20
  # --- Screw zones: mounting hole anchors. The left side is the source of
  # truth; each hole is mirrored across the matrix axis (same ref/distance as
  # the matrix) to generate its right-half twin (mirror_screw_*). The
  # screw_left / screw_right tags drive per-PCB footprint placement; the
  # /screw/ name regex drives the outline cutouts (matches both halves). ---
  zones.screw_left_left:
    mirror: &screw_mirror
      ref: matrix_five_num
      distance: 5u
    key.tags.screw_left: true
    key.mirror.tags: &screw_mirror_tags
      screw_left: $unset
      screw_right: true
    anchor:
      - ref: matrix_one_home
        shift: [-9.5, 9.525]
  zones.screw_left_center:
    mirror: *screw_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      - ref: matrix_three_home
        shift: [-10.15, -12.525]
  zones.screw_left_right:
    mirror: *screw_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      - ref: matrix_five_home
        shift: [-8.85, 9.525]

# --- Outlines: Board shape, cutouts, and geometric features ---
outlines:
  _boxleft:
    - what: polygon
      points:
        # Outer (pinky) edge: mirror of the right half's outer edge (the right
        # half sets the 158mm width via its extra inner column). The left pinky
        # ends up well clear of its keys.
        - ref: matrix_zero_num
          shift: [-u/2 -u +0.475, u/2 +5.729]

        # Cutout for USB-c port
        # Centered on the Liatris USB socket, which sits 0.127mm left of the
        # MCU origin (socket outline spans local x -3.81..+3.556). The left MCU
        # is un-rotated, so subtract 0.127 from the 13/23 edges.
        - ref: matrix_five_num
          shift: [13 - 0.127, u/2 +5.729]
        - ref: matrix_five_num
          shift: [13 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [23 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [23 - 0.127, u/2 +5.729]

        - ref: matrix_five_num
          shift: [u + 15.6, u/2 +5.729]
        - ref: matrix_five_lower
          shift: [u + 15.6, -1u -1/2u]
        - ref: matrix_zero_mod
          shift: [-u/4 -u +0.475, -u/2]
  _boxright:
    - what: polygon
      points:
        - ref: mirror_matrix_five_num
          shift: [u + 15.6, u/2 +5.729]

        # Cutout for USB-c port
        # Perfect mirror of the left half: same -0.127 socket-centering offset
        # (ergogen flips the x-shift for mirror_* refs, so the same expression
        # lands at the mirrored position). The right MCU is oriented to put its
        # USB socket at the top, matching the left.
        - ref: mirror_matrix_five_num
          shift: [23 - 0.127, u/2 +5.729]
        - ref: mirror_matrix_five_num
          shift: [23 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [13 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [13 - 0.127, u/2 +5.729]

        # Outer (pinky) edge: the right half is the wider one (it has an extra
        # inner column), so it sets the board width. Pulled in 0.475 from the
        # outer key hull to round the half width down from 158.475 to 158mm.
        # That -0.475 cuts ~0.475 into the outer key's 1u hull but stays ~1mm
        # clear of the switch -- fine in practice. The left half mirrors this.
        - ref: extra_equal_num
          shift: [u/2 -0.475, u/2 +5.729]
        - ref: extra_equal_lower
          shift: [u/2 -0.475, -u/2 -u]
        - ref: mirror_matrix_five_lower
          shift: [u + 15.6, -u -1/2u]
  _boundsleft:
    - what: rectangle
      where: left
      size: u
      bound: true
  _boundsright:
    - what: rectangle
      where: right
      size: u
      bound: true
  _screws:
    - what: circle
      where: /screw/
      radius: 1.75
  _switchholesleft:
    - what: rectangle
      where: left
      size: c
  _switchholesright:
    - what: rectangle
      where: right
      size: c
  # Binding is scoped to the thumb cluster only. The main matrix is fully
  # enclosed by the box, so binding those keys would add 1u key-hulls that poke
  # above the box top edge and pin it 0.271mm high (forcing a subtract to get a
  # flat 119mm top). The thumb cluster sits below the box bottom, so it still
  # needs its hull. Scoping the binding here lets the box govern the matrix
  # outline directly -- no top-trim subtract needed.
  _thumbbindingleft:
    - what: rectangle
      where: /^thumbcluster/
      size: u
      bound: true
  _thumbbindingright:
    - what: rectangle
      where: /^mirror_thumbcluster/
      size: u
      bound: true
  _switchoutlinesleft:
    - what: rectangle
      where: left
      fillet: 1
      size: s
  _switchoutlinesright:
    - what: rectangle
      where: right
      fillet: 1
      size: s
  _wallsleft:
    - name: _boxleft
    - name: _thumbbindingleft
  _wallsright:
    - name: _boxright
    - name: _thumbbindingright
  left:
    - name: _wallsleft
    - name: _switchoutlinesleft
      operation: stack
    - name: _switchholesleft
      operation: subtract
    - name: _screws
      operation: subtract
  right:
    - name: _wallsright
    - name: _switchoutlinesright
      operation: stack
    - name: _switchholesright
      operation: subtract
    - name: _screws
      operation: subtract
  full:
    - name: left
    - name: right
  bounds:
    - name: full
    - name: _boundsleft
      operation: stack
    - name: _boundsright
      operation: stack

# Example:
# https://github.com/MrCarney/mrkeyboard/blob/main/mrkeyboard.yaml
pcbs:
  left:
    template: kicad8 # Required, since ceoloide footprints are KiCad 8 only
    outlines:
      main.outline: _wallsleft
      keycaps:
        outline: _switchoutlinesleft
        layer: Eco1.User
    footprints:
      # --- Diode: Nexperia BAS16H,115 (SOD-123) ---
      diode: &diode
        what: ceoloide/diode_tht_sod123
        where: left
        adjust:
          shift: [0, -5]
        params:
          side: B
          include_tht: false
          from: "{{colrow}}"
          to: "{{row_net}}"
      # --- Mounting Hole: Non-plated through hole for M3 screw ---
      mounting_hole_npth: &mounting_hole_npth
        what: ceoloide/mounting_hole_npth
        where: screw_left
        params:
          hole_drill: 3.5 # M3 is 3.4mm
          hole_size: 3.5
      # --- MX Switch: Any MX-compatible switch, hotswap enabled ---
      mx: &mx
        what: ceoloide/switch_mx
        where: left
        params:
          side: B
          hotswap: true
          solder: false
          from: "{{column_net}}" # Pin 1
          to: "{{colrow}}" # Pin 2
      # --- Microcontroller: splitkb Liatris ---
      mcu: &mcu
        what: mcu_liatris
        where:
          ref: matrix_five_num
          shift: [mcu_x, -2.25]
        params:
          side: F
          reversible: false
          reverse_mount: true
      # --- Reset Button: E-Switch TL3342F450QG ---
      reset: &reset
        what: button
        where:
          ref: matrix_five_home
          rotate: 270
          shift: [mcu_x, 9.525] # level with adjacent mounting hole (screw_left_right)
        params:
          from: GND
          to: RST
          side: B
      # --- TRRS Jack: HCTL HC-PJ-320A-4P-D ---
      # Hot-unplug mitigation: GND on the sleeve (last contact to break on
      # withdrawal, so the two halves keep a common ground/return path), serial
      # data on an interior ring (R2), VCC on the tip. Matches the footprint
      # header recommendation in ceoloide/trrs_pj320a.js.
      # DATA_RAW is the un-protected net between the jack ring and the data-line
      # protection (TVS + series resistor); after the resistor it becomes P0 and
      # goes to the MCU.
      trrs: &trrs
        what: ceoloide/trrs_pj320a
        where:
          ref: matrix_five_num
          shift: [trrs_x, trrs_y]
        params:
          TP: VCC # 1  Tip
          R1: VCC # 2  Ring 1 (no pad emitted in symmetric mode)
          R2: DATA_RAW # 3  Ring 2  Routed via TVS (to GND) and 100Ω resistor (to P0/MCU)
          SL: GND # 4  Sleeve
          reversible: true
          side: B
          # Symmetric uses only TP/R2/SL, which is exactly this 3-net pinout
          symmetric: true
      # --- Data-line TVS: Littelfuse SMF3.3CA (SOD-123FL, bidirectional, 3.3V) ---
      # Clamps transients on the TRRS data line (e.g. hot-unplug) before they
      # reach the MCU. Reference D<n>; value SMF3.3CA.
      #   pad "A" (anode)   = from = DATA_RAW  (the un-protected jack-side net)
      #   pad "K" (cathode) = to   = GND       (clamp return)
      # Bidirectional, so A/K orientation is electrically irrelevant here.
      data_tvs: &data_tvs
        what: sod-123fl
        where:
          ref: matrix_five_num
          shift: [trrs_x, trrs_y - 16] # below TRRS jack body, near R2 (data) pad (reversible THT footprint, no side)
        params:
          from: DATA_RAW
          to: GND
      # --- Data-line series resistor: 100Ω 0805 (Panasonic ERJ-6ENF1000V) ---
      # In series between the DATA_RAW node and the MCU's GP1 (P0) pin; limits
      # residual surge current after the TVS. Reference R<n>; "100R" silk label.
      #   pad 1 = net_1_from = DATA_RAW (TVS/jack side)
      #   pad 2 = net_1_to   = P0       (MCU side)
      data_resistor: &data_resistor
        what: infused-kim/smd_0805
        where:
          ref: matrix_five_num
          rotate: 90 # P0 pad on the left (pads stack vertically by default)
          shift: [trrs_x, trrs_y - 22] # below the TVS, ~2.38mm gap == MCU-TVS gap (side B)
        params:
          designator: R # reference prefix -> R<n> (not the generic "SMD")
          label_1: "100R" # value printed on silk
          components: 1
          net_1_from: DATA_RAW
          net_1_to: P0
          side: B
  right:
    template: kicad8 # Required, since ceoloide footprints are KiCad 8 only
    outlines:
      main.outline: _wallsright
      keycaps:
        outline: _switchoutlinesright
        layer: Eco1.User
    footprints:
      # See left for footprint details
      diode:
        <<: *diode
        where: right
      mounting_hole_npth:
        <<: *mounting_hole_npth
        where: screw_right
      mx:
        <<: *mx
        where: right
      mcu:
        <<: *mcu
        where:
          ref: mirror_matrix_five_num
          shift: [mcu_x, -2.25]
        # Flipped to the back (side B), not the left's front. mcu_liatris can't
        # mirror in-plane, so a side flip is what reflects its pads to mirror
        # the left half while keeping the USB at the top. (rotate: 180 mirrored
        # x but swung the USB to the bottom.) params is respecified in full
        # because an explicit `params` replaces the merged *mcu params.
        params:
          side: B
          reversible: false
          reverse_mount: true
      reset:
        <<: *reset
        where:
          ref: mirror_matrix_five_home
          rotate: 270
          shift: [mcu_x, 9.525] # level with adjacent mounting hole (screw_right_left)
      trrs:
        <<: *trrs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_x, trrs_y]
      data_tvs:
        <<: *data_tvs
        where:
          ref: mirror_matrix_five_num
          rotate: 180 # flips A/K to mirror the left half (bidirectional TVS, electrically irrelevant)
          shift: [trrs_x, trrs_y - 16]
      data_resistor:
        <<: *data_resistor
        where:
          ref: mirror_matrix_five_num
          rotate: 90 # P0 pad toward the MCU, mirroring the left half
          shift: [trrs_x, trrs_y - 22]
