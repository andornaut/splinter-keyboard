meta:
  engine: 4.2.1 # min; matches package.json ergogen dep

# --- Units: Common measurements used throughout the config ---
units:
  c: 14 # MX cutout/hole length
  s: 16 # MX widest is 15.6mm
  u: U # key pitch (ergogen U = 19.05mm)
  # --- MCU/reset/TRRS/TVS/resistor placement (off matrix_five_num, both halves) ---
  # x is shared per column: MCU+reset on mcu_reset_x, TRRS+TVS+resistor on trrs_tvs_resistor_x.
  mcu_reset_x: 18
  mcu_y: -2.25
  reset_y: 9.525 # level with the screw_*_right hole
  trrs_tvs_resistor_x: mcu_reset_x + 13
  trrs_y: 15
  tvs_y: trrs_y - 16 # TVS, near the R2 data pad
  resistor_y: trrs_y - 30 # dropped low so its label fits below the MCU
  # --- Silkscreen credit text offsets (shared by both halves) ---
  # Single two-line text (name + URL on a \n). Center-justified so the reversible
  # back copy mirrors onto the same spot (left/right-justify would land it off the
  # edge). y anchors the block center; x centers the wider URL line (~1.5mm in).
  label_credit_y: 12.75
  label_credit_x_left: -u/2 -u +24.775 # left pinky
  label_credit_x_right: u/2 -24.775 # right pinky
  # --- Component label y-offsets (silkscreen). Each label reuses its component's
  # x var, so it sits in the same column; only y here places it above/below.
  # (label_screw_dx is the exception: a horizontal offset beside each screw hole.) ---
  label_mcu_y: -20
  label_trrs_y: 1.5
  label_tvs_y: -4.5
  label_resistor_y: -19.2
  label_reset_y: 3
  label_screw_dx: 4.6

# --- Points: Key matrix, thumb cluster, and mounting hole locations ---
points:
  # --- Main key matrix: standard alphanumeric and modifier keys ---
  zones.matrix:
    anchor:
      # Absolute origin (cosmetic): the only absolute coord; just slides the
      # design on the sheet. recenter.py (run by `npm run build`) re-centers each
      # PCB afterward, so the exact value doesn't matter.
      shift: [69, -192]
    # Left half is the source of truth, mirrored to build the right. Keys marked
    # `mirror.skip: true` are left-only; their right counterparts live in
    # zones.extra and the thumbcluster, so must not be auto-mirrored.
    mirror:
      ref: matrix_five_num
      distance: 5u
    key.tags.left: true
    key.mirror.tags:
      left: $unset
      right: true
    columns:
      zero:
        key.column_net: P2
        rows:
          mod: # LCTRL
            bind: [0, u/4, 0, u/4]
            shift: [-u/4, 0]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          lower: # LSHIFT
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          home: # ESC
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          upper: # TAB
            bind: [0, u/4, 0, u/4]
            spread: 1.5u
            width: 1.5u
            mirror.skip: true
          num: # `
            shift: [u/4, 0]
            mirror.skip: true
      one:
        key.column_net: P3
        rows:
          mod: # SUPER
            mirror.skip: true
          lower: # Z
            mirror.skip: true
          home: # A
            mirror.skip: true
          upper: # Q
            mirror.skip: true
          num: # 1
            mirror.skip: true
      # Columns two-five are mirrored to the right half. The mirror nets are
      # constant per column (column_net) and per row (row_net, set in `rows`
      # below), so they're declared once via key.mirror.* rather than per key.
      # Comments show left key -> right (mirrored) key.
      two:
        key.stagger: 3
        key.column_net: P9
        key.mirror.column_net: P5
        rows:
          mod: # LALT
            mirror.skip: true
          lower: # X -> .
            bind: 1
          home: # S -> L
          upper: # W -> O
          num: # 2 -> 9
      three:
        key.stagger: 3
        key.column_net: P8
        key.mirror.column_net: P4
        rows:
          mod.skip: true # no mod-row key here
          lower: # C -> ,
            bind: 0
          home: # D -> K
          upper: # E -> I
          num: # 3 -> 8
      four:
        key.stagger: -3
        key.column_net: P7
        key.mirror.column_net: P3
        rows:
          mod.skip: true
          lower: # V -> M
            bind: 0
          home: # F -> J
          upper: # R -> U
          num: # 4 -> 7
      five:
        key.stagger: -3
        key.column_net: P6
        key.mirror.column_net: P20
        rows:
          mod.skip: true
          lower: # B -> N
            bind: 0
          home: # G -> H
          upper: # T -> Y
          num: # 5 -> 6
    # Per-row nets: row_net is the left mapping; mirror.row_net the right half's.
    # (The matrix mod row is never mirrored, so it needs no mirror.row_net.)
    rows:
      mod.row_net: P10
      lower:
        row_net: P16
        mirror.row_net: P14
      home:
        row_net: P14
        mirror.row_net: P16
      upper:
        row_net: P15
        mirror.row_net: P10
      num:
        row_net: P5
        mirror.row_net: P15
  # --- Extra keys: the right half's inner columns ---
  # Right counterparts to the left's mirror.skip columns, defined explicitly
  # because they differ (backspace, punctuation, right mods). 9u right.
  zones.extra:
    key.tags.right: true
    anchor:
      ref: matrix_five_mod
      shift: [9u, 0]
    columns:
      zero:
        key.column_net: P6
        rows:
          mod: # BACKSPACE
            bind: [0, u/4, 0, u/4]
            shift: [u/4, 0]
            width: 1.5u
          lower: # /
            shift: [-u/4, 0]
          home: # ;
          upper: # P
          num: # 0
      dash:
        key.column_net: P7
        rows:
          mod.skip: true
          lower: # \
          home: # '
          upper: # [
          num: # -
      equal:
        key.column_net: P8
        rows:
          mod.skip: true
          lower: # SHIFT
          home: # ENTER
          upper: # ]
          num: # =
    # Right-half row->net mapping (differs from the main matrix's left mapping).
    rows:
      mod.row_net: P9
      lower.row_net: P14
      home.row_net: P16
      upper.row_net: P10
      num.row_net: P15
  # --- Thumbcluster: keys for thumbs, mirrored for both hands ---
  zones.thumbcluster:
    anchor:
      ref: matrix_four_lower
      shift: [-3.45, -1u -3]
    key.tags.left: true
    key.row_net: P10 # all thumb keys on the mod row
    key.mirror.tags:
      left: $unset
      right: true
    key.mirror.row_net: P9 # right-half mod row
    mirror:
      ref: mirror_matrix_five_lower
      distance: -5u
    columns:
      three.rows.mod: # BACKSPACE
        splay: -18.925
        column_net: P8
        mirror:
          column_net: P4
      four.rows.mod: # SPACE
        bind: [0, u/4, 0, u/4]
        spread: 1.25u
        width: 1.5u
        column_net: P7
        mirror:
          column_net: P3
      five.rows.mod: # MOD
        shift: [u/4, 0]
        column_net: P6
        mirror:
          column_net: P20
  # --- Screw zones: mounting-hole anchors. Left is the source of truth, mirrored
  # across the matrix axis to the right (mirror_screw_*). screw_left/screw_right
  # tags drive per-PCB footprints; the /screw/ regex drives the outline cutouts. ---
  zones.screw_left_left:
    mirror: &screw_mirror
      ref: matrix_five_num
      distance: 5u
    key.tags.screw_left: true
    key.mirror.tags: &screw_mirror_tags
      screw_left: $unset
      screw_right: true
    anchor:
      ref: matrix_one_home
      shift: [-9.5, 9.525]
  zones.screw_left_center:
    mirror: *screw_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      ref: matrix_three_home
      shift: [-10.15, -12.525]
  zones.screw_left_right:
    mirror: *screw_mirror
    key.tags.screw_left: true
    key.mirror.tags: *screw_mirror_tags
    anchor:
      ref: matrix_five_home
      shift: [-8.85, 9.525]

# --- Outlines: Board shape, cutouts, and geometric features ---
outlines:
  _boxleft:
    - what: polygon
      points:
        # Outer (pinky) edge: mirror of the right's outer edge (right sets the
        # 158mm width). Left pinky ends up well clear of its keys.
        - ref: matrix_zero_num
          shift: [-u/2 -u +0.475, u/2 +5.75]

        # USB-C cutout, centered on the Liatris socket (0.127mm left of the MCU
        # origin). Left MCU un-rotated, so subtract 0.127 from the 13/23 edges.
        - ref: matrix_five_num
          shift: [13 - 0.127, u/2 +5.75]
        - ref: matrix_five_num
          shift: [13 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [23 - 0.127, u/2 -1.271]
        - ref: matrix_five_num
          shift: [23 - 0.127, u/2 +5.75]

        - ref: matrix_five_num
          shift: [u + 15.6, u/2 +5.75]
        - ref: matrix_five_lower
          shift: [u + 15.6, -1u -1/2u]
        - ref: matrix_zero_mod
          shift: [-u/4 -u +0.475, -u/2]
  _boxright:
    - what: polygon
      points:
        - ref: mirror_matrix_five_num
          shift: [u + 15.6, u/2 +5.75]

        # USB-C cutout, mirror of the left (ergogen flips x-shift for mirror_*
        # refs). Right MCU oriented to put the USB at the top, matching the left.
        - ref: mirror_matrix_five_num
          shift: [23 - 0.127, u/2 +5.75]
        - ref: mirror_matrix_five_num
          shift: [23 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [13 - 0.127, u/2 -1.271]
        - ref: mirror_matrix_five_num
          shift: [13 - 0.127, u/2 +5.75]

        # Outer (pinky) edge: the right is wider (extra inner column), so it sets
        # the board width. Pulled in 0.475 to round 158.475 -> 158mm; cuts into
        # the key hull but stays ~1mm clear of the switch. Left mirrors this.
        - ref: extra_equal_num
          shift: [u/2 -0.475, u/2 +5.75]
        - ref: extra_equal_lower
          shift: [u/2 -0.475, -u/2 -u]
        - ref: mirror_matrix_five_lower
          shift: [u + 15.6, -u -1/2u]
  _boundsleft:
    - what: rectangle
      where: left
      size: u
      bound: true
  _boundsright:
    - what: rectangle
      where: right
      size: u
      bound: true
  _screws:
    - what: circle
      where: /screw/
      radius: 1.75
  _switchholesleft:
    - what: rectangle
      where: left
      size: c
  _switchholesright:
    - what: rectangle
      where: right
      size: c
  # Binding scoped to the thumb cluster only: the matrix is enclosed by the box,
  # so binding it would poke 1u hulls above the top edge (needing a trim). The
  # thumb cluster sits below the box, so it still needs its hull.
  _thumbbindingleft:
    - what: rectangle
      where: /^thumbcluster/
      size: u
      bound: true
  _thumbbindingright:
    - what: rectangle
      where: /^mirror_thumbcluster/
      size: u
      bound: true
  _switchoutlinesleft:
    - what: rectangle
      where: left
      fillet: 1
      size: s
  _switchoutlinesright:
    - what: rectangle
      where: right
      fillet: 1
      size: s
  _wallsleft:
    - name: _boxleft
    - name: _thumbbindingleft
  _wallsright:
    - name: _boxright
    - name: _thumbbindingright
  left:
    - name: _wallsleft
    - name: _switchoutlinesleft
      operation: stack
    - name: _switchholesleft
      operation: subtract
    - name: _screws
      operation: subtract
  right:
    - name: _wallsright
    - name: _switchoutlinesright
      operation: stack
    - name: _switchholesright
      operation: subtract
    - name: _screws
      operation: subtract
  full:
    - name: left
    - name: right
  bounds:
    - name: full
    - name: _boundsleft
      operation: stack
    - name: _boundsright
      operation: stack

pcbs:
  left:
    template: kicad8 # ceoloide footprints need KiCad 8
    outlines:
      main.outline: _wallsleft
      keycaps:
        outline: _switchoutlinesleft
        layer: Eco1.User
    footprints:
      # --- Diode: Nexperia BAS16H,115 (SOD-123) ---
      diode: &diode
        what: ceoloide/diode_tht_sod123
        where: left
        adjust:
          shift: [0, -5]
        params:
          side: B
          include_tht: false
          from: "{{colrow}}"
          to: "{{row_net}}"
      # --- Mounting Hole: Non-plated through hole for M3 screw ---
      mounting_hole_npth: &mounting_hole_npth
        what: ceoloide/mounting_hole_npth
        where: screw_left
        params:
          hole_drill: 3.5 # M3 is 3.4mm
          hole_size: 3.5
      # --- MX Switch: Any MX-compatible switch, hotswap enabled ---
      mx: &mx
        what: ceoloide/switch_mx
        where: left
        params:
          side: B
          hotswap: true
          solder: false
          from: "{{column_net}}" # Pin 1
          to: "{{colrow}}" # Pin 2
      # --- Microcontroller: splitkb Liatris ---
      mcu: &mcu
        what: mcu_liatris
        where:
          ref: matrix_five_num
          shift: [mcu_reset_x, mcu_y]
        params: &mcu_params
          side: F
          reversible: false
          reverse_mount: true
          include_extra_pins: false # GP12-GP16 unused
          show_silk_labels_on_both_sides: true # MCU hides its mounting-side silk; mirror pin labels to the exposed side too
      # --- Reset Button: E-Switch TL3342F450QG ---
      reset: &reset
        what: button
        where:
          ref: matrix_five_home
          rotate: 270
          shift: [mcu_reset_x, reset_y]
        params:
          from: GND
          to: RST
          side: B
      # --- TRRS Jack: HCTL HC-PJ-320A-4P-D ---
      # Hot-unplug mitigation: GND on the sleeve (last to break), data on ring R2,
      # VCC on the tip (per ceoloide/trrs_pj320a.js). DATA_RAW is the unprotected
      # jack-side net; after the TVS+resistor it becomes P0 to the MCU.
      trrs: &trrs
        what: ceoloide/trrs_pj320a
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, trrs_y]
        params:
          TP: VCC # 1  Tip
          R2: DATA_RAW # 3 Ring 2 (via TVS to GND, 100Ω to P0)
          SL: GND # 4  Sleeve
          reversible: true
          side: B
          # Symmetric uses only TP/R2/SL, which is exactly this 3-net pinout
          symmetric: true
      # --- Data-line TVS: Littelfuse SMF3.3CA (SOD-123FL, bidirectional 3.3V) ---
      # Clamps data-line transients (e.g. hot-unplug) before the MCU.
      # from=A=DATA_RAW, to=K=GND; bidirectional so A/K orientation is irrelevant.
      data_tvs: &data_tvs
        what: sod-123fl
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, tvs_y] # near the R2 pad (reversible THT, no side)
        params:
          from: DATA_RAW
          to: GND
      # --- Data-line series resistor: 100Ω 0805 (Panasonic ERJ-6ENF1000V) ---
      # In series from DATA_RAW (net_1_from) to the MCU's P0/GP1 (net_1_to);
      # limits residual surge current after the TVS.
      data_resistor: &data_resistor
        what: infused-kim/smd_0805
        where:
          ref: matrix_five_num
          rotate: 90 # P0 pad on the left
          shift: [trrs_tvs_resistor_x, resistor_y]
        params:
          designator: R # ref prefix R<n>
          label_1: "" # value+part shown by the silk label instead
          components: 1
          net_1_from: DATA_RAW
          net_1_to: P0
          side: B
      # --- Silkscreen credit text: top pinky-side margin, both silk layers ---
      # reversible -> a copy on F+B silk. Center-justified so the back copy
      # mirrors onto the same spot. Centered over the pinky top corner. Left half.
      label_credit: &label_credit
        what: ceoloide/utility_text
        where:
          ref: matrix_zero_num
          shift: [label_credit_x_left, label_credit_y]
        params:
          reversible: true
          layer: SilkS
          height: 1.2
          width: 1.2
          thickness: 0.18
          text: '\"Splinter\" keyboard v4 by @andornaut\nhttps://github.com/andornaut/splinter-keyboard'
      # --- Component labels (silkscreen, both sides) ---
      # Reversible texts below each component, on the same refs; the right half
      # re-anchors to mirror_ refs (x-shift auto-flips).
      label_mcu: &label_mcu
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [mcu_reset_x, label_mcu_y]
        params: &label_params
          reversible: true
          layer: SilkS
          height: 0.8
          width: 0.8
          thickness: 0.15
          text: splitkb Liatris
      label_trrs: &label_trrs
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_y]
        params:
          <<: *label_params
          text: TRRS
      label_tvs: &label_tvs
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_tvs_y]
        params:
          <<: *label_params
          text: 'TVS\nLittelfuse\nSMF3.3CA'
      label_resistor: &label_resistor
        what: ceoloide/utility_text
        where:
          ref: matrix_five_num
          shift: [trrs_tvs_resistor_x, label_resistor_y]
        params:
          <<: *label_params
          text: '100R\nPanasonic\nERJ-6ENF\n1000V' # split to fit the narrow channel
      label_reset: &label_reset
        what: ceoloide/utility_text
        where:
          ref: matrix_five_home
          shift: [mcu_reset_x, label_reset_y]
        params:
          <<: *label_params
          text: 'Reset switch\nE-Switch\nTL3342F450QG'
      # Screw labels: beside each hole (directly below is blocked by keys),
      # anchored per-hole so each goes to its open side.
      label_screw_ll: &label_screw_ll
        what: ceoloide/utility_text
        where:
          ref: screw_left_left
          shift: [-label_screw_dx, 0]
        params:
          reversible: true
          layer: SilkS
          height: 0.8
          width: 0.8
          thickness: 0.15
          text: M3x0.5
      label_screw_lc:
        <<: *label_screw_ll
        where:
          ref: screw_left_center
          shift: [-label_screw_dx, 0]
      label_screw_lr:
        <<: *label_screw_ll
        where:
          ref: screw_left_right
          shift: [label_screw_dx, 0]
  right:
    template: kicad8 # Required, since ceoloide footprints are KiCad 8 only
    outlines:
      main.outline: _wallsright
      keycaps:
        outline: _switchoutlinesright
        layer: Eco1.User
    footprints:
      # See left for footprint details
      diode:
        <<: *diode
        where: right
      mounting_hole_npth:
        <<: *mounting_hole_npth
        where: screw_right
      mx:
        <<: *mx
        where: right
      mcu:
        <<: *mcu
        where:
          ref: mirror_matrix_five_num
          shift: [mcu_reset_x, mcu_y]
        # Side B (not the left's F): mcu_liatris can't mirror in-plane, so the
        # side flip reflects its pads while keeping the USB at the top.
        params:
          <<: *mcu_params
          side: B
      reset:
        <<: *reset
        where:
          ref: mirror_matrix_five_home
          rotate: 270
          shift: [mcu_reset_x, reset_y]
      trrs:
        <<: *trrs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, trrs_y]
      data_tvs:
        <<: *data_tvs
        where:
          ref: mirror_matrix_five_num
          rotate: 180 # mirror A/K (bidirectional, irrelevant)
          shift: [trrs_tvs_resistor_x, tvs_y]
      data_resistor:
        <<: *data_resistor
        where:
          ref: mirror_matrix_five_num
          # Same value as the left, NOT 270: the mirror_ ref auto-negates the
          # rotation (renders as -90), so this is already the left's mirror image
          # and P0 still faces the MCU. Setting 270 here would double-flip it.
          rotate: 90
          shift: [trrs_tvs_resistor_x, resistor_y]
      # Right half: centered over the outer (pinky) top corner, mirroring the
      # left half's placement.
      label_credit:
        <<: *label_credit
        where:
          ref: extra_equal_num
          shift: [label_credit_x_right, label_credit_y]
      # Right half component labels: mirror_ refs auto-flip the x-shift.
      label_mcu:
        <<: *label_mcu
        where:
          ref: mirror_matrix_five_num
          shift: [mcu_reset_x, label_mcu_y]
      label_trrs:
        <<: *label_trrs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_trrs_y]
      label_tvs:
        <<: *label_tvs
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_tvs_y]
      label_resistor:
        <<: *label_resistor
        where:
          ref: mirror_matrix_five_num
          shift: [trrs_tvs_resistor_x, label_resistor_y]
      label_reset:
        <<: *label_reset
        where:
          ref: mirror_matrix_five_home
          shift: [mcu_reset_x, label_reset_y]
      label_screw_ll:
        <<: *label_screw_ll
        where:
          ref: mirror_screw_left_left
          shift: [-label_screw_dx, 0]
      label_screw_lc:
        <<: *label_screw_ll
        where:
          ref: mirror_screw_left_center
          shift: [-label_screw_dx, 0]
      label_screw_lr:
        <<: *label_screw_ll
        where:
          ref: mirror_screw_left_right
          shift: [label_screw_dx, 0]
