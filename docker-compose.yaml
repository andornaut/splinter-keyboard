name: ergogen
services:
  ergogen:
    build: .
    container_name: ergogen

    # (Re)build the image on `docker compose up` without needing --build. Uses
    # the layer cache, so it's fast when nothing changed. Adding a new custom
    # footprint still needs `docker compose build --no-cache` to bust the cache.
    pull_policy: build

    # The container runs as the unprivileged "node" user; allow it to bind the
    # privileged port 80 so http://ergogen.internal works without a port suffix.
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0

    # Don't map ports to the host to avoid conflicting with other containers.
    # Instead, install https://github.com/andornaut/docker_etc_hosts to
    # automatically create/update a "ergogen.internal" entry in /etc/hosts
    # ports:
    #   - "${ERGOGEN_PORT:-3000}:3000"
